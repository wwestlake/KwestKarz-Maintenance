# HTTP — certbot will add the HTTPS server block automatically
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # React SPA
    root /var/www/kwestkarz;
    index index.html;

    # Serve static assets with long cache
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API — proxy to .NET backend
    location /api/ {
        proxy_pass         http://127.0.0.1:5081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
